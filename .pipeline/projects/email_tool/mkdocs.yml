site_name: Email Tool
site_description: Automated email organization and management tool
site_author: Email Tool Team
site_url: https://email-tool.example.com

repo_url: https://github.com/example/email-tool
repo_name: email-tool

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [../workspace/email_tool]
          options:
            docstring_style: google
            show_root_heading: true
            show_source: true
  - mkdocs-jupyter:
      execute: false
  - macros
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - footnotes
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - installation.md
    - configuration.md
    - quickstart.md
  - Features:
    - overview.md
    - email-organization.md
    - rules-engine.md
    - dashboard.md
    - daemon.md
  - API Reference:
    - api/cli.md
    - api/config.md
    - api/processor.md
    - api/organizer.md
    - api/rules.md
  - Development:
    - development/setup.md
    - development/testing.md
    - development/docker.md
    - development/contributing.md
  - Changelog: changelog.md
  - License: license.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/example/email-tool
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/emailtool
  generator: false

copyright: Copyright &copy; 2024 Email Tool Team
