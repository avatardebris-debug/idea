# Inbox Zero Configuration
# This configuration helps achieve and maintain an inbox zero state

version: "1.0"

settings:
  archive_base: "./archive"
  dry_run: false
  collision_strategy: "rename"
  log_level: "INFO"
  verbose: false
  debug: false

connectors:
  gmail:
    enabled: true
    account: "your.email@gmail.com"
    client_id: "your-client-id"
    client_secret: "your-client-secret"
    refresh_token: "your-refresh-token"
    label_prefix: "email-tool/"
    sync_labels: true
    max_emails_per_sync: 1000

rules:
  # Rule 1: Archive read emails after 7 days
  - name: "archive_read_emails"
    description: "Archive emails read more than 7 days ago"
    enabled: true
    priority: 200
    conditions:
      - field: "read"
        operator: "equals"
        value: true
      - field: "date"
        operator: "lt"
        value: "7 days ago"
    actions:
      - type: "move"
        params:
          destination: "archive/read"
      - type: "label"
        params:
          labels: ["read", "archived"]

  # Rule 2: Process newsletters immediately
  - name: "process_newsletters"
    description: "Move newsletters to archive immediately"
    enabled: true
    priority: 150
    conditions:
      - field: "subject"
        operator: "regex"
        value: ".*\\[Newsletter\\].*"
    actions:
      - type: "move"
        params:
          destination: "archive/newsletters"
      - type: "label"
        params:
          labels: ["newsletter"]
      - type: "delete"
        params:
          confirm: false

  # Rule 3: Handle emails from known contacts
  - name: "handle_known_contacts"
    description: "Process emails from known contacts"
    enabled: true
    priority: 100
    conditions:
      - field: "from"
        operator: "in"
        value: ["boss@company.com", "team@company.com", "client@company.com"]
    actions:
      - type: "label"
        params:
          labels: ["important", "known"]
      - type: "notify"
        params:
          type: "log"
          message: "Important email from known contact: {from}"

  # Rule 4: Process urgent emails
  - name: "process_urgent_emails"
    description: "Handle urgent emails with notifications"
    enabled: true
    priority: 250
    conditions:
      - field: "subject"
        operator: "regex"
        value: ".*\\[URGENT\\].*"
    actions:
      - type: "label"
        params:
          labels: ["urgent", "important"]
      - type: "notify"
        params:
          type: "slack"
          message: "URGENT email received: {subject}"
      - type: "file"
        params:
          format: "md"
          destination: "urgent"

  # Rule 5: Archive promotional emails
  - name: "archive_promotional"
    description: "Archive promotional and marketing emails"
    enabled: true
    priority: 80
    conditions:
      - field: "subject"
        operator: "contains"
        value: "Promo"
    actions:
      - type: "move"
        params:
          destination: "archive/promotional"
      - type: "label"
        params:
          labels: ["promotional"]

  # Rule 6: Process emails with attachments
  - name: "process_attachments"
    description: "Process emails with attachments"
    enabled: true
    priority: 90
    conditions:
      - field: "has_attachments"
        operator: "equals"
        value: true
    actions:
      - type: "label"
        params:
          labels: ["has_attachments"]
      - type: "attachment_process"
        params:
          extract_to: "downloads"
          process_types: ["pdf", "image", "office"]

  # Rule 7: Handle emails from specific domains
  - name: "handle_specific_domains"
    description: "Process emails from specific domains"
    enabled: true
    priority: 70
    conditions:
      - field: "from"
        operator: "regex"
        value: ".*@company\\.com$"
    actions:
      - type: "label"
        params:
          labels: ["company", "internal"]

  # Rule 8: Archive old emails
  - name: "archive_old_emails"
    description: "Archive emails older than 30 days"
    enabled: true
    priority: 60
    conditions:
      - field: "date"
        operator: "lt"
        value: "30 days ago"
    actions:
      - type: "move"
        params:
          destination: "archive/old"
      - type: "label"
        params:
          labels: ["old", "archived"]

  # Rule 9: Process emails from boss
  - name: "process_boss_emails"
    description: "Special handling for boss emails"
    enabled: true
    priority: 300
    conditions:
      - field: "from"
        operator: "contains"
        value: "boss@company.com"
    actions:
      - type: "label"
        params:
          labels: ["boss", "important", "urgent"]
      - type: "notify"
        params:
          type: "log"
          message: "Email from boss: {subject}"
      - type: "file"
        params:
          format: "md"
          destination: "boss"

  # Rule 10: Handle emails with specific keywords
  - name: "process_keywords"
    description: "Process emails with specific keywords"
    enabled: true
    priority: 50
    conditions:
      - field: "subject"
        operator: "regex"
        value: ".*\\[Action\\].*"
    actions:
      - type: "label"
        params:
          labels: ["action_required"]
      - type: "notify"
        params:
          type: "log"
          message: "Action required: {subject}"

labels:
  work:
    color: "#3b82f6"
    icon: "briefcase"
  personal:
    color: "#10b981"
    icon: "user"
  finance:
    color: "#f59e0b"
    icon: "dollar-sign"
  urgent:
    color: "#ef4444"
    icon: "alert-circle"
  newsletter:
    color: "#8b5cf6"
    icon: "newspaper"
  read:
    color: "#6b7280"
    icon: "check"
  archived:
    color: "#9ca3af"
    icon: "archive"
  promotional:
    color: "#ec4899"
    icon: "gift"
  has_attachments:
    color: "#f97316"
    icon: "paperclip"
  company:
    color: "#3b82f6"
    icon: "building"
  internal:
    color: "#10b981"
    icon: "users"
  boss:
    color: "#ef4444"
    icon: "user-check"
  action_required:
    color: "#f59e0b"
    icon: "check-circle"

attachments:
  enabled: true
  download_dir: "./downloads"
  max_size: 10485760
  processors:
    - type: "pdf"
      enabled: true
    - type: "image"
      enabled: true
    - type: "office"
      enabled: true
    - type: "zip"
      enabled: true

dashboard:
  enabled: true
  host: "0.0.0.0"
  port: 8000
  auth_enabled: false

daemon:
  enabled: true
  sync_interval: 15
  log_file: "./logs/daemon.log"
  pid_file: "./logs/daemon.pid"

performance:
  max_workers: 4
  batch_size: 100
  cache_ttl: 3600
  connection_pooling: true
  pool_size: 10

notifications:
  enabled: true
  channels:
    - type: "log"
      enabled: true
    - type: "slack"
      enabled: false
      webhook_url: "https://hooks.slack.com/services/..."
