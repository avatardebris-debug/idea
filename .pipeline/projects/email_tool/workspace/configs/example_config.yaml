# Basic Email Tool Configuration
# This is a minimal configuration to get started with Email Tool

version: "1.0"

# Global settings
settings:
  # Base directory for archived emails
  archive_base: "./archive"
  
  # Dry run mode - set to true to test without making changes
  dry_run: false
  
  # Collision strategy for duplicate filenames
  # Options: rename, number, overwrite
  collision_strategy: "rename"
  
  # Logging level
  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_level: "INFO"
  
  # Enable verbose output
  verbose: false
  
  # Enable debug mode
  debug: false

# Email connectors - configure at least one
connectors:
  # Gmail connector example
  gmail:
    enabled: false
    account: "your.email@gmail.com"
    client_id: "your-client-id"
    client_secret: "your-client-secret"
    refresh_token: "your-refresh-token"
    
  # IMAP connector example
  imap:
    enabled: false
    server: "imap.example.com"
    port: 993
    username: "your-username"
    password: "your-password"
    use_ssl: true
    
  # MBOX connector example
  mbox:
    enabled: false
    file_path: "/path/to/mailbox.mbox"

# Processing rules - define your automation rules here
rules:
  # Example rule: Archive emails from specific sender
  - name: "archive_from_boss"
    description: "Archive emails from boss"
    enabled: true
    priority: 100
    conditions:
      - field: "from"
        operator: "contains"
        value: "boss@company.com"
    actions:
      - type: "move"
        params:
          destination: "archive/work/boss"
      - type: "label"
        params:
          labels: ["work", "boss", "important"]

  # Example rule: Filter newsletters
  - name: "filter_newsletters"
    description: "Move newsletters to archive"
    enabled: true
    priority: 50
    conditions:
      - field: "subject"
        operator: "contains"
        value: "[Newsletter]"
    actions:
      - type: "move"
        params:
          destination: "archive/newsletters"
      - type: "label"
        params:
          labels: ["newsletter"]

# Attachment processing settings
attachments:
  # Enable attachment processing
  enabled: true
  
  # Download directory for attachments
  download_dir: "./downloads"
  
  # File size limit in bytes (10MB default)
  max_size: 10485760
  
  # Process specific attachment types
  processors:
    - type: "pdf"
      enabled: true
    - type: "image"
      enabled: true
    - type: "office"
      enabled: true
    - type: "zip"
      enabled: true

# Dashboard settings
dashboard:
  # Enable web dashboard
  enabled: true
  
  # Server host
  host: "0.0.0.0"
  
  # Server port
  port: 8000
  
  # Enable authentication
  auth_enabled: false

# Daemon settings
daemon:
  # Enable background daemon
  enabled: false
  
  # Sync interval in minutes
  sync_interval: 60
  
  # Log file for daemon
  log_file: "./logs/daemon.log"
  
  # PID file location
  pid_file: "./logs/daemon.pid"

# Labels and categories
labels:
  work:
    color: "#3b82f6"
    icon: "briefcase"
  personal:
    color: "#10b981"
    icon: "user"
  finance:
    color: "#f59e0b"
    icon: "dollar-sign"
  urgent:
    color: "#ef4444"
    icon: "alert-circle"
  newsletter:
    color: "#8b5cf6"
    icon: "newspaper"

# Performance settings
performance:
  # Number of worker threads
  max_workers: 4
  
  # Batch size for processing
  batch_size: 100
  
  # Cache TTL in seconds
  cache_ttl: 3600
  
  # Enable connection pooling
  connection_pooling: true
  
  # Pool size
  pool_size: 10

# Backup settings
backup:
  # Enable automatic backups
  enabled: false
  
  # Backup frequency (cron format)
  schedule: "0 2 * * *"
  
  # Backup destination
  destination: "./backups"
  
  # Keep last N backups
  keep_last: 7
  
  # Compress backups
  compress: true

# Notification settings
notifications:
  # Enable notifications
  enabled: false
  
  # Notification channels
  channels:
    - type: "email"
      enabled: true
      recipients: ["admin@example.com"]
    - type: "slack"
      enabled: false
      webhook_url: "https://hooks.slack.com/services/..."
    - type: "webhook"
      enabled: false
      url: "https://example.com/webhook"

# Custom templates
templates:
  # Auto-reply template
  auto_reply: |
    Thank you for your email. I will get back to you soon.
    
    Best regards,
    [Your Name]
    
  # Forward template
  forward: |
    Please review the following email:
    
    {subject}
    
    From: {from}
    Date: {date}
    
    {body}
    
    Best regards,
    [Your Name]

# Time-based conditions
time_conditions:
  # Business hours (9 AM - 5 PM, Monday - Friday)
  business_hours:
    start: "09:00"
    end: "17:00"
    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]
    
  # Weekend
  weekend:
    days: ["saturday", "sunday"]
    
  # After hours
  after_hours:
    start: "17:00"
    end: "09:00"
    days: ["monday", "tuesday", "wednesday", "thursday", "friday"]

# Custom fields
custom_fields:
  # Add custom fields to emails
  - name: "department"
    type: "string"
    required: false
  - name: "project_id"
    type: "string"
    required: false
  - name: "priority"
    type: "enum"
    options: ["low", "medium", "high", "urgent"]
    required: false

# Integration settings
integrations:
  # Slack integration
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/..."
    channel: "#email-tool"
    
  # Google Drive integration
  google_drive:
    enabled: false
    folder_id: "your-folder-id"
    
  # Notion integration
  notion:
    enabled: false
    api_key: "your-notion-api-key"
    database_id: "your-database-id"

# Security settings
security:
  # Enable encryption for sensitive data
  encryption_enabled: true
  
  # Encryption key (use environment variable in production)
  encryption_key: "your-encryption-key"
  
  # Enable audit logging
  audit_logging: true
  
  # Audit log file
  audit_log_file: "./logs/audit.log"

# Experimental features
experimental:
  # Enable experimental features
  enabled: false
  
  # Features to enable
  features:
    - "ai_classification"
    - "smart_sorting"
    - "auto_categorization"
