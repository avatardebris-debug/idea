# Basic Email Tool Configuration
# This is a minimal configuration for getting started with Email Tool

email_tool:
  # Gmail configuration
  gmail:
    enabled: true
    credentials_path: ~/.gmail-credentials
    token_path: ~/.gmail-token
  
  # IMAP configuration (disabled by default)
  imap:
    enabled: false
    server: imap.example.com
    port: 993
    username: user@example.com
    password: your_password
    use_ssl: true
  
  # Processing configuration
  rules_path: ./rules.yaml
  output_dir: ./output
  log_level: INFO
  max_workers: 4
  batch_size: 100
  
  # LLM configuration (optional)
  llm:
    provider: openai
    api_key: ${LLM_API_KEY}
    model: gpt-3.5-turbo
    temperature: 0.7
    max_tokens: 500
    timeout: 30
  
  # Dashboard configuration
  dashboard:
    host: 127.0.0.1
    port: 5000
    debug: false
    secret_key: your-secret-key

# Example rules for basic email processing
rules:
  # Rule 1: Mark emails with "urgent" in subject as high priority
  - name: "Urgent Email Detection"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "urgent"
    priority: 90
    category: "work"
    labels: ["work", "urgent"]
    description: "High priority work emails"
  
  # Rule 2: Archive newsletters
  - name: "Newsletter Archiving"
    rule_type: "FROM_CONTAINS"
    pattern: "newsletter@"
    priority: 50
    category: "archive"
    labels: ["newsletter"]
    description: "Archive newsletter emails"
  
  # Rule 3: Detect invoice emails
  - name: "Invoice Detection"
    rule_type: "SUBJECT_REGEX"
    pattern: "^INV-[0-9]{4}$"
    priority: 70
    category: "finance"
    labels: ["invoice"]
    description: "Match invoice emails"
  
  # Rule 4: Process emails with PDF attachments
  - name: "PDF Processing"
    rule_type: "ATTACHMENT_TYPE"
    pattern: "pdf"
    priority: 60
    category: "documents"
    labels: ["pdf", "documents"]
    description: "Emails with PDF attachments"
  
  # Rule 5: Weekly report detection
  - name: "Weekly Reports"
    rule_type: "DATE_DAY_OF_WEEK"
    pattern: "MONDAY"
    priority: 60
    category: "reports"
    labels: ["reports"]
    description: "Weekly reports sent on Mondays"

# Connector configuration
connectors:
  gmail:
    enabled: true
    scopes:
      - "https://www.googleapis.com/auth/gmail.readonly"
      - "https://www.googleapis.com/auth/gmail.labels"
  
  imap:
    enabled: false
    timeout: 30
    max_retries: 3
  
  mbox:
    enabled: false
    format: mbox
    encoding: utf-8
  
  ost:
    enabled: false
    timeout: 60

# Dashboard configuration
dashboard:
  host: 127.0.0.1
  port: 5000
  debug: false
  secret_key: your-secret-key
  auth:
    enabled: false
    username: admin
    password: admin
  ssl:
    enabled: false
    cert_path: /path/to/cert.pem
    key_path: /path/to/key.pem

# Monitoring configuration
monitoring:
  prometheus:
    enabled: false
    port: 9090
  grafana:
    enabled: false
    url: http://grafana:3000

# Notification configuration
notifications:
  email:
    enabled: false
    recipients: ["admin@example.com"]
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/..."
  webhook:
    enabled: false
    url: "https://api.example.com/webhook"
