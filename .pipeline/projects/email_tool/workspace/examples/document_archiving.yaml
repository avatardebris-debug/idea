# Document Archiving Configuration
# This configuration handles systematic document archiving,
# categorization, and long-term storage of email documents.

email_tool:
  # Gmail configuration
  gmail:
    enabled: true
    credentials_path: ~/.gmail-credentials
    token_path: ~/.gmail-token
  
  # Processing configuration
  rules_path: ./rules/document_archiving.yaml
  output_dir: ./output/archived_documents
  log_level: INFO
  max_workers: 4
  batch_size: 100

# Document archiving rules
rules:
  # Contract Documents
  - name: "Contract Detection"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "contract"
    priority: 90
    category: "legal"
    labels: ["contract", "legal", "archive"]
    description: "Identify contract emails for archiving"

  - name: "Agreement Detection"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "agreement"
    priority: 85
    category: "legal"
    labels: ["agreement", "legal", "archive"]
    description: "Identify agreement emails for archiving"

  - name: "NDA Detection"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "nda"
    priority: 90
    category: "legal"
    labels: ["nda", "legal", "confidential"]
    description: "Identify NDA emails for archiving"

  # Invoice and Financial Documents
  - name: "Invoice Archiving"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "invoice"
    priority: 85
    category: "financial"
    labels: ["invoice", "financial", "archive"]
    description: "Archive invoice documents"

  - name: "Receipt Archiving"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "receipt"
    priority: 80
    category: "financial"
    labels: ["receipt", "financial", "archive"]
    description: "Archive receipt documents"

  - name: "Tax Document Archiving"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "tax"
    priority: 85
    category: "financial"
    labels: ["tax", "financial", "archive"]
    description: "Archive tax-related documents"

  # Technical Documents
  - name: "Technical Specification"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "specification"
    priority: 75
    category: "technical"
    labels: ["specification", "technical", "archive"]
    description: "Archive technical specifications"

  - name: "Documentation Archive"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "documentation"
    priority: 70
    category: "technical"
    labels: ["documentation", "technical", "archive"]
    description: "Archive technical documentation"

  # Project Documents
  - name: "Project Proposal"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "proposal"
    priority: 80
    category: "project"
    labels: ["proposal", "project", "archive"]
    description: "Archive project proposals"

  - name: "Project Report"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "project report"
    priority: 75
    category: "project"
    labels: ["report", "project", "archive"]
    description: "Archive project reports"

  # HR Documents
  - name: "HR Policy Document"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "hr policy"
    priority: 70
    category: "hr"
    labels: ["hr", "policy", "archive"]
    description: "Archive HR policy documents"

  - name: "Employee Record"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "employee record"
    priority: 85
    category: "hr"
    labels: ["employee", "record", "confidential"]
    description: "Archive employee records"

  # Legal and Compliance
  - name: "Compliance Document"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "compliance"
    priority: 85
    category: "legal"
    labels: ["compliance", "legal", "archive"]
    description: "Archive compliance documents"

  - name: "Regulatory Document"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "regulatory"
    priority: 80
    category: "legal"
    labels: ["regulatory", "legal", "archive"]
    description: "Archive regulatory documents"

  # Attachment-Based Archiving
  - name: "PDF Document Archive"
    rule_type: "ATTACHMENT_TYPE"
    pattern: "pdf"
    priority: 75
    category: "documents"
    labels: ["pdf", "document", "archive"]
    description: "Archive PDF documents from emails"

  - name: "Word Document Archive"
    rule_type: "ATTACHMENT_TYPE"
    pattern: "docx"
    priority: 70
    category: "documents"
    labels: ["word", "document", "archive"]
    description: "Archive Word documents from emails"

  - name: "Excel Document Archive"
    rule_type: "ATTACHMENT_TYPE"
    pattern: "xlsx"
    priority: 70
    category: "documents"
    labels: ["excel", "document", "archive"]
    description: "Archive Excel documents from emails"

  - name: "PowerPoint Archive"
    rule_type: "ATTACHMENT_TYPE"
    pattern: "pptx"
    priority: 65
    category: "documents"
    labels: ["powerpoint", "presentation", "archive"]
    description: "Archive PowerPoint presentations"

  # Date-Based Archiving
  - name: "Annual Report Archive"
    rule_type: "DATE_DAY_OF_MONTH"
    pattern: "1"
    priority: 60
    category: "reports"
    labels: ["annual-report", "archive"]
    description: "Archive annual reports"

  - name: "Quarterly Report Archive"
    rule_type: "DATE_DAY_OF_MONTH"
    pattern: "15"
    priority: 60
    category: "reports"
    labels: ["quarterly-report", "archive"]
    description: "Archive quarterly reports"

  # Long-Term Storage
  - name: "Archive 7 Years"
    rule_type: "DATE_BEFORE"
    pattern: "7 years ago"
    priority: 50
    category: "long-term"
    labels: ["archived", "7-year"]
    description: "Move emails to 7-year archive"

  - name: "Archive 10 Years"
    rule_type: "DATE_BEFORE"
    pattern: "10 years ago"
    priority: 40
    category: "long-term"
    labels: ["archived", "10-year"]
    description: "Move emails to 10-year archive"

# Connector configuration
connectors:
  gmail:
    enabled: true
    scopes:
      - "https://www.googleapis.com/auth/gmail.readonly"
      - "https://www.googleapis.com/auth/gmail.labels"
      - "https://www.googleapis.com/auth/gmail.modify"
  
  imap:
    enabled: false
    timeout: 30
    max_retries: 3

# Notification configuration
notifications:
  email:
    enabled: true
    recipients: ["admin@example.com"]
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/..."
  webhook:
    enabled: false
    url: "https://api.example.com/webhook"

# Dashboard configuration
dashboard:
  host: 127.0.0.1
  port: 5003
  debug: false
  secret_key: archiving-secret-key
  auth:
    enabled: true
    username: archive_admin
    password: secure_password
  ssl:
    enabled: true
    cert_path: /path/to/cert
    key_path: /path/to/key