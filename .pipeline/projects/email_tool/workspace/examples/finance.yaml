# Financial Email Processing Configuration
# This configuration handles invoice detection, expense categorization,
# and financial document archiving.

email_tool:
  # Gmail configuration
  gmail:
    enabled: true
    credentials_path: ~/.gmail-credentials
    token_path: ~/.gmail-token
  
  # Processing configuration
  rules_path: ./rules/finance.yaml
  output_dir: ./output/finance
  log_level: INFO
  max_workers: 4
  batch_size: 100

# Financial email processing rules
rules:
  # Invoice Detection Rules
  - name: "Invoice Detection - Primary"
    rule_type: "SUBJECT_REGEX"
    pattern: "^INV[- ]?[0-9]{4,8}$"
    priority: 95
    category: "finance"
    labels: ["invoice", "finance", "urgent"]
    description: "Match invoice emails with standard invoice numbering"

  - name: "Invoice Detection - Alternative"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "invoice"
    priority: 90
    category: "finance"
    labels: ["invoice", "finance"]
    description: "Match emails with 'invoice' in subject"

  - name: "Invoice Detection - Body Pattern"
    rule_type: "BODY_REGEX"
    pattern: "Invoice Number[:\\s]+[#]?[0-9]{4,8}"
    priority: 85
    category: "finance"
    labels: ["invoice", "finance"]
    description: "Match invoice emails by body pattern"

  # Purchase Order Detection
  - name: "Purchase Order Detection"
    rule_type: "SUBJECT_REGEX"
    pattern: "^PO[- ]?[0-9]{4,8}$"
    priority: 90
    category: "finance"
    labels: ["purchase-order", "finance"]
    description: "Match purchase order emails"

  - name: "Purchase Order Body Detection"
    rule_type: "BODY_CONTAINS"
    pattern: "purchase order"
    priority: 80
    category: "finance"
    labels: ["purchase-order", "finance"]
    description: "Match emails mentioning purchase orders"

  # Receipt and Expense Detection
  - name: "Receipt Detection"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "receipt"
    priority: 75
    category: "finance"
    labels: ["receipt", "expense"]
    description: "Match receipt emails"

  - name: "Expense Report Detection"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "expense report"
    priority: 70
    category: "finance"
    labels: ["expense", "report"]
    description: "Match expense report emails"

  # Bank and Transaction Notifications
  - name: "Bank Transaction Alert"
    rule_type: "FROM_EXACT"
    pattern: "noreply@bank.com"
    priority: 85
    category: "finance"
    labels: ["bank", "transaction", "urgent"]
    description: "Match bank transaction notifications"

  - name: "Payment Confirmation"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "payment confirmation"
    priority: 80
    category: "finance"
    labels: ["payment", "confirmation"]
    description: "Match payment confirmation emails"

  # Tax and Compliance
  - name: "Tax Document Detection"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "tax"
    priority: 75
    category: "finance"
    labels: ["tax", "compliance"]
    description: "Match tax-related emails"

  - name: "1099 Form Detection"
    rule_type: "SUBJECT_REGEX"
    pattern: "1099"
    priority: 80
    category: "finance"
    labels: ["tax", "form", "1099"]
    description: "Match 1099 form emails"

  # Vendor and Supplier Communications
  - name: "Vendor Invoice"
    rule_type: "FROM_CONTAINS"
    pattern: "@vendor.com"
    priority: 70
    category: "finance"
    labels: ["vendor", "invoice"]
    description: "Match vendor invoice emails"

  - name: "Supplier Communication"
    rule_type: "FROM_CONTAINS"
    pattern: "@supplier.com"
    priority: 65
    category: "finance"
    labels: ["supplier", "communication"]
    description: "Match supplier communications"

  # High Priority Financial Alerts
  - name: "Urgent Payment Required"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "payment required"
    priority: 95
    category: "finance"
    labels: ["urgent", "payment", "action-required"]
    description: "Match urgent payment required emails"

  - name: "Overdue Invoice Alert"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "overdue"
    priority: 90
    category: "finance"
    labels: ["overdue", "urgent", "invoice"]
    description: "Match overdue invoice alerts"

  # Attachment-Based Processing
  - name: "PDF Invoice Processing"
    rule_type: "ATTACHMENT_TYPE"
    pattern: "pdf"
    priority: 70
    category: "finance"
    labels: ["pdf", "invoice", "document"]
    description: "Process emails with PDF attachments"

  - name: "Excel Financial Data"
    rule_type: "ATTACHMENT_TYPE"
    pattern: "xlsx"
    priority: 65
    category: "finance"
    labels: ["excel", "financial", "data"]
    description: "Process emails with Excel attachments"

  # Date-Based Processing
  - name: "Monthly Statement"
    rule_type: "DATE_DAY_OF_MONTH"
    pattern: "1"
    priority: 60
    category: "finance"
    labels: ["statement", "monthly"]
    description: "Match monthly statements sent on the 1st"

  - name: "End of Month Processing"
    rule_type: "DATE_DAY_OF_MONTH"
    pattern: "30|31"
    priority: 60
    category: "finance"
    labels: ["statement", "end-of-month"]
    description: "Match end-of-month financial emails"

# Connector configuration
connectors:
  gmail:
    enabled: true
    scopes:
      - "https://www.googleapis.com/auth/gmail.readonly"
      - "https://www.googleapis.com/auth/gmail.labels"
  
  imap:
    enabled: false
    timeout: 30
    max_retries: 3

# Notification configuration
notifications:
  email:
    enabled: true
    recipients: ["finance-team@example.com"]
  slack:
    enabled: true
    webhook_url: "https://hooks.slack.com/services/..."
  webhook:
    enabled: false
    url: "https://api.example.com/webhook"

# Dashboard configuration
dashboard:
  host: 127.0.0.1
  port: 5001
  debug: false
  secret_key: finance-secret-key
  auth:
    enabled: true
    username: finance_admin
    password: secure_password
  ssl:
    enabled: true
    cert_path: /path/to/cert
    key_path: /path/to/key