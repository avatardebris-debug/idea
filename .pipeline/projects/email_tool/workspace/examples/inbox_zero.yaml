# Inbox Zero Workflow Configuration
# This configuration implements an inbox zero methodology,
# helping users process and clear their email inbox systematically.

email_tool:
  # Gmail configuration
  gmail:
    enabled: true
    credentials_path: ~/.gmail-credentials
    token_path: ~/.gmail-token
  
  # Processing configuration
  rules_path: ./rules/inbox_zero.yaml
  output_dir: ./output/inbox_zero
  log_level: INFO
  max_workers: 4
  batch_size: 100

# Inbox Zero processing rules
rules:
  # Read and Archive Old Emails
  - name: "Archive Old Read Emails"
    rule_type: "DATE_BEFORE"
    pattern: "2023-01-01"
    priority: 10
    category: "archive"
    labels: ["archived", "old"]
    description: "Archive emails older than 2023-01-01"

  - name: "Archive Read Emails 30 Days"
    rule_type: "DATE_BEFORE"
    pattern: "30 days ago"
    priority: 20
    category: "archive"
    labels: ["archived", "read"]
    description: "Archive emails read more than 30 days ago"

  # Process Unread Emails
  - name: "Flag Unread Important"
    rule_type: "UNREAD"
    priority: 90
    category: "unread"
    labels: ["unread", "important"]
    description: "Flag unread emails as important"

  - name: "Process Unread - Action Required"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "action required"
    priority: 95
    category: "action-required"
    labels: ["action-required", "urgent"]
    description: "Identify emails requiring immediate action"

  - name: "Process Unread - Meeting Requests"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "meeting"
    priority: 85
    category: "meetings"
    labels: ["meeting", "calendar"]
    description: "Identify meeting request emails"

  # Process by Sender
  - name: "Archive Newsletters"
    rule_type: "FROM_CONTAINS"
    pattern: "newsletter@"
    priority: 30
    category: "archive"
    labels: ["newsletter", "archive"]
    description: "Archive newsletter emails"

  - name: "Archive Notifications"
    rule_type: "FROM_CONTAINS"
    pattern: "noreply@"
    priority: 25
    category: "archive"
    labels: ["notification", "archive"]
    description: "Archive automated notification emails"

  - name: "Archive Marketing"
    rule_type: "FROM_CONTAINS"
    pattern: "@marketing.com"
    priority: 20
    category: "archive"
    labels: ["marketing", "archive"]
    description: "Archive marketing emails"

  # Process by Content
  - name: "Flag Emails with Attachments"
    rule_type: "HAS_ATTACHMENT"
    priority: 70
    category: "attachments"
    labels: ["attachment", "important"]
    description: "Flag emails with attachments for review"

  - name: "Flag Emails with Links"
    rule_type: "BODY_CONTAINS"
    pattern: "http://"
    priority: 40
    category: "links"
    labels: ["links", "review"]
    description: "Flag emails containing links for review"

  # Priority Processing
  - name: "Urgent Emails"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "urgent"
    priority: 95
    category: "urgent"
    labels: ["urgent", "action-required"]
    description: "Identify urgent emails"

  - name: "High Priority Emails"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "high priority"
    priority: 90
    category: "high-priority"
    labels: ["high-priority", "important"]
    description: "Identify high priority emails"

  - name: "Important Emails"
    rule_type: "SUBJECT_CONTAINS"
    pattern: "important"
    priority: 85
    category: "important"
    labels: ["important"]
    description: "Identify important emails"

  # Time-Based Processing
  - name: "Weekend Emails"
    rule_type: "DATE_DAY_OF_WEEK"
    pattern: "SATURDAY|SUNDAY"
    priority: 50
    category: "weekend"
    labels: ["weekend", "review"]
    description: "Flag weekend emails for review"

  - name: "After-Hours Emails"
    rule_type: "TIME_BEFORE"
    pattern: "18:00"
    priority: 40
    category: "after-hours"
    labels: ["after-hours", "review"]
    description: "Flag after-hours emails"

  # Inbox Zero Actions
  - name: "Mark as Read"
    rule_type: "UNREAD"
    priority: 100
    category: "inbox-zero"
    labels: ["read"]
    description: "Mark processed emails as read"

  - name: "Archive Processed"
    rule_type: "ALL_MATCH"
    priority: 100
    category: "inbox-zero"
    labels: ["archived"]
    description: "Archive processed emails"

  - name: "Star Important"
    rule_type: "UNREAD"
    priority: 95
    category: "inbox-zero"
    labels: ["starred", "important"]
    description: "Star important unread emails"

# Connector configuration
connectors:
  gmail:
    enabled: true
    scopes:
      - "https://www.googleapis.com/auth/gmail.readonly"
      - "https://www.googleapis.com/auth/gmail.labels"
      - "https://www.googleapis.com/auth/gmail.modify"
  
  imap:
    enabled: false
    timeout: 30
    max_retries: 3

# Notification configuration
notifications:
  email:
    enabled: true
    recipients: ["user@example.com"]
  slack:
    enabled: false
    webhook_url: "https://hooks.slack.com/services/..."
  webhook:
    enabled: false
    url: "https://api.example.com/webhook"

# Dashboard configuration
dashboard:
  host: 127.0.0.1
  port: 5002
  debug: false
  secret_key: inbox-zero-secret-key
  auth:
    enabled: true
    username: inbox_admin
    password: secure_password
  ssl:
    enabled: true
    cert_path: /path/to/cert
    key_path: /path/to/key