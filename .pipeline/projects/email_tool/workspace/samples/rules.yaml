# Sample Rules Configuration for Email Tool
# This file defines rules for organizing emails

rules:
  # Rule 1: Move emails with "Important" in subject to inbox
  - name: important_emails
    type: subject_contains
    pattern: "Important"
    priority: 10
    action: move
    params:
      destination: inbox

  # Rule 2: Move emails from spam sources to spam folder
  - name: spam_filter
    type: from_contains
    pattern: "spam"
    priority: 5
    action: move
    params:
      destination: spam

  # Rule 3: Move emails from company domain to work folder
  - name: company_emails
    type: from_domain
    pattern: "company.com"
    priority: 8
    action: move
    params:
      destination: work

  # Rule 4: Move emails with "Meeting" in subject to calendar folder
  - name: meeting_emails
    type: subject_contains
    pattern: "Meeting"
    priority: 7
    action: move
    params:
      destination: calendar

  # Rule 5: Move emails from specific sender to VIP folder
  - name: vip_emails
    type: from_contains
    pattern: "boss@"
    priority: 9
    action: move
    params:
      destination: vip

  # Rule 6: Move emails with "Invoice" in subject to finance folder
  - name: invoice_emails
    type: subject_contains
    pattern: "Invoice"
    priority: 6
    action: move
    params:
      destination: finance
