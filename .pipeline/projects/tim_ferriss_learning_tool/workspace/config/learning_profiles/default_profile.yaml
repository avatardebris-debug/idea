# Default Learning Profile for Tim Ferriss Learning Tool
# Based on DESS (Deconstruction, Selection, Sequencing, Stakes) and CAFE (Compression, Frequency, Encoding) frameworks

learning_profile:
  name: "default"
  description: "Default learning configuration for rapid skill acquisition"

  # DESS Framework Settings
  deconstruction:
    # How deeply to deconstruct topics
    depth: "comprehensive"  # options: basic, comprehensive, expert
    # Number of sub-components to extract
    max_sub_components: 10
    # Focus areas for deconstruction
    focus_areas:
      - "key_concepts"
      - "practical_applications"
      - "common_mistakes"
      - "learning_resources"

  selection:
    # Criteria for selecting the vital 20%
    vital_percentage: 20
    # Selection criteria weights
    criteria_weights:
      impact: 0.4
      frequency: 0.3
      learnability: 0.3
    # Minimum number of vital elements to extract
    min_vital_elements: 5

  sequencing:
    # Learning sequence preferences
    sequence_type: "progressive"  # options: progressive, parallel, hybrid
    # Time allocation per session (minutes)
    session_duration: 45
    # Break duration between sessions (minutes)
    break_duration: 10
    # Maximum daily learning hours
    max_daily_hours: 2

  stakes:
    # Accountability mechanisms
    accountability_level: "medium"  # options: low, medium, high
    # Stakes types to implement
    stakes_types:
      - "public_commitment"
      - "financial_penalty"
      - "progress_tracking"
    # Minimum progress threshold (%)
    progress_threshold: 70

  # CAFE Framework Settings
  compression:
    # Information compression techniques
    techniques:
      - "flashcards"
      - "mind_maps"
      - "cheat_sheets"
      - "summaries"
    # Maximum compression ratio (original:compressed)
    max_ratio: 10
    # Compression format preferences
    preferred_formats:
      - "markdown"
      - "json"

  frequency:
    # Spaced repetition settings
    algorithm: "sm-2"  # SuperMemo-2 or custom
    # Initial review intervals (days)
    review_intervals: [1, 3, 7, 14, 30]
    # Minimum reviews before mastery
    min_reviews: 5
    # Mastery threshold (%)
    mastery_threshold: 90

  encoding:
    # Memory encoding techniques
    techniques:
      - "elaboration"
      - "visualization"
      - "mnemonics"
      - "storytelling"
    # Encoding depth
    depth: "deep"  # options: surface, deep
    # Use of analogies and metaphors
    use_analogies: true
    # Connection to prior knowledge
    connect_to_prior: true

  # General Settings
  llm:
    # LLM provider settings
    provider: "openai"  # options: openai, anthropic, local
    model: "gpt-4o"
    temperature: 0.7
    max_tokens: 2048

  output:
    # Output format preferences
    format: "markdown"  # options: markdown, json, html
    # Include timestamps in output
    include_timestamps: true
    # Include source references
    include_sources: true

  # Learning Goals
  goals:
    # Primary learning objective
    primary_objective: "rapid_skill_acquisition"
    # Secondary objectives
    secondary_objectives:
      - "long_term_retention"
      - "practical_application"
      - "transferable_skills"

  # Progress Tracking
  tracking:
    # Metrics to track
    metrics:
      - "completion_percentage"
      - "retention_rate"
      - "practice_frequency"
      - "assessment_scores"
    # Review frequency (days)
    review_frequency: 7
