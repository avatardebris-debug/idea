# Example configuration file for the 80/20 Learning Extraction Pipeline

# Learning profile - defines your learning goals and preferences
learning_profile:
  topic: "Python Programming"
  current_level: "Beginner"
  learning_goals:
    - "Master Python fundamentals"
    - "Learn data analysis libraries"
    - "Build practical projects"
  time_availability: "10 hours/week"
  learning_style: "Visual"
  preferred_resources:
    - "Books"
    - "Videos"
    - "Interactive tutorials"
  constraints:
    - "No prior programming experience"
    - "Need practical, hands-on learning"
    - "Prefer project-based approach"

# Extraction settings - configure the extraction behavior
extraction_settings:
  model: "gpt-4o"
  temperature: 0.5
  max_tokens: 3072
  
  # Frequency analysis settings
  frequency_analysis:
    min_frequency: 2
    max_concepts: 10
    
  # Pattern extraction settings
  pattern_extraction:
    include_compression: true
    include_abstraction: true
    include_framing: true
    include_encoding: true
    
  # Outline extraction settings
  outline_extraction:
    include_prerequisites: true
    include_activities: true
    include_time_estimates: true

# Output settings
output_settings:
  format: "json"
  include_timestamps: true
  output_directory: "./extraction_results"
