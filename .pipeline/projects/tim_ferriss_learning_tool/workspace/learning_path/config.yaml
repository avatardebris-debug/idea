# Learning Path Generator Configuration

# OpenAI Settings
openai:
  model: "gpt-4o"
  temperature: 0.5

# Path Generation Settings
path_generation:
  num_paths: 3
  include_customization: true
  include_resources: true

# Module Settings
modules:
  min_modules: 3
  max_modules: 8
  min_topics_per_module: 2
  max_topics_per_module: 6

# Milestone Settings
milestones:
  min_milestones: 2
  max_milestones: 5

# Resource Settings
resources:
  min_resources: 2
  max_resources: 5