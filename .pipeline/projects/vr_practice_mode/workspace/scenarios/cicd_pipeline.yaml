# Scenario: CI/CD Pipeline
# Description: Manage a CI/CD pipeline with build, test, and deploy stages

name: cicd_pipeline
description: Manage a CI/CD pipeline by coordinating build, test, and deploy thronglets through the deployment stages.

thronglet_roles:
  - id: "build"
    role: build_server
    name: "Build Thronglet"
    icon: "🔨"
    position: { x: -4, y: 2, z: 0 }
    health: healthy
    color: "#9c27b0"
    description: "Builds the application code"
    
  - id: "test"
    role: test_server
    name: "Test Thronglet"
    icon: "🧪"
    position: { x: -2, y: 2, z: 0 }
    health: healthy
    color: "#9c27b0"
    description: "Runs automated tests"
    
  - id: "deploy"
    role: deploy_server
    name: "Deploy Thronglet"
    icon: "🚀"
    position: { x: 0, y: 2, z: 0 }
    health: healthy
    color: "#9c27b0"
    description: "Deploys to production"
    
  - id: "notify"
    role: notification
    name: "Notification Thronglet"
    icon: "🔔"
    position: { x: 2, y: 2, z: 0 }
    health: healthy
    color: "#9c27b0"
    description: "Sends deployment notifications"

objectives:
  - id: "start_build"
    title: "Start Build Process"
    description: "Initiate the build process with the build thronglet"
    condition: "build_started"
    points: 50
    
  - id: "run_tests"
    title: "Run Tests"
    description: "Execute tests with the test thronglet"
    condition: "tests_passed"
    points: 100
    
  - id: "deploy_app"
    title: "Deploy to Production"
    description: "Deploy the application with the deploy thronglet"
    condition: "deployment_complete"
    points: 150
    
  - id: "notify_success"
    title: "Send Notification"
    description: "Send deployment notification with the notification thronglet"
    condition: "notification_sent"
    points: 50

success_conditions:
  - condition: "notification_sent"
    message: "CI/CD pipeline completed successfully! Application deployed."

initial_state:
  connections: []
  current_objective: "start_build"
  pipeline_stage: "idle"
