# Scenario: Deploy a Web App
# Description: Guide frontend, backend, and database thronglets through a deployment workflow

name: deploy_web_app
description: Deploy a web application by connecting frontend, backend, and database thronglets in the correct order.

thronglet_roles:
  - id: "db"
    role: database
    name: "Database Thronglet"
    icon: "🗄️"
    position: { x: -5, y: 2, z: 0 }
    health: healthy
    color: "#4fc3f7"
    description: "The database stores all application data"
    
  - id: "backend"
    role: web_server
    name: "Backend Thronglet"
    icon: "🖥️"
    position: { x: 0, y: 2, z: 0 }
    health: healthy
    color: "#ff9800"
    description: "The backend server processes requests"
    
  - id: "frontend"
    role: frontend
    name: "Frontend Thronglet"
    icon: "🌐"
    position: { x: 5, y: 2, z: 0 }
    health: healthy
    color: "#4caf50"
    description: "The frontend displays the user interface"

objectives:
  - id: "connect_db_backend"
    title: "Connect Database to Backend"
    description: "Guide the backend thronglet to connect with the database"
    condition: "backend_connected_to_db"
    points: 100
    
  - id: "connect_backend_frontend"
    title: "Connect Backend to Frontend"
    description: "Guide the frontend thronglet to connect with the backend"
    condition: "frontend_connected_to_backend"
    points: 100
    
  - id: "deploy_app"
    title: "Deploy the Application"
    description: "Complete the deployment by establishing all connections"
    condition: "all_connected"
    points: 200

success_conditions:
  - condition: "all_connected"
    message: "Application deployed successfully! All thronglets are connected."

initial_state:
  connections: []
  current_objective: "connect_db_backend"
