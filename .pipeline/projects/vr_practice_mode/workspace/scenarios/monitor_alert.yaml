# Scenario: Monitor and Alert
# Description: Monitor thronglet health and respond to alerts

name: monitor_alert
description: Monitor thronglet health metrics and respond to critical alerts before they cause system failure.

thronglet_roles:
  - id: "server1"
    role: server
    name: "Server Alpha"
    icon: "🖥️"
    position: { x: -3, y: 2, z: 0 }
    health: healthy
    color: "#4fc3f7"
    description: "Primary web server"
    
  - id: "server2"
    role: server
    name: "Server Beta"
    icon: "🖥️"
    position: { x: 3, y: 2, z: 0 }
    health: healthy
    color: "#4fc3f7"
    description: "Secondary web server"
    
  - id: "db"
    role: database
    name: "Database Cluster"
    icon: "🗄️"
    position: { x: 0, y: 2, z: -3 }
    health: healthy
    color: "#ff9800"
    description: "Main database cluster"
    
  - id: "cache"
    role: cache
    name: "Cache Layer"
    icon: "⚡"
    position: { x: 0, y: 2, z: 3 }
    health: healthy
    color: "#4caf50"
    description: "Redis cache layer"

objectives:
  - id: "monitor_health"
    title: "Monitor System Health"
    description: "Check the health status of all thronglets"
    condition: "health_checked"
    points: 50
    
  - id: "respond_alert"
    title: "Respond to Critical Alert"
    description: "Identify and respond to the critical thronglet"
    condition: "alert_responded"
    points: 150
    
  - id: "restore_service"
    title: "Restore Service"
    description: "Restore the affected thronglet to healthy status"
    condition: "service_restored"
    points: 100

success_conditions:
  - condition: "service_restored"
    message: "All systems restored! Service is healthy."

initial_state:
  connections: []
  current_objective: "monitor_health"
  alert_thronglet: "server1"
  alert_type: "high_cpu"
