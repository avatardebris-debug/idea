version: '3.8'

services:
  youtube-studio:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: youtube-studio:latest
    container_name: youtube-studio
    environment:
      - PYTHONUNBUFFERED=1
      - YOUTUBE_STUDIO_LOG_LEVEL=${YOUTUBE_STUDIO_LOG_LEVEL:-INFO}
      - YOUTUBE_STUDIO_CONFIG=/app/config.json
    volumes:
      - ./workspace:/app/workspace
      - ./templates:/app/templates
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "from youtube_studio import StudioOrchestrator; o = StudioOrchestrator()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    command: ["python", "-m", "youtube_studio.cli", "--help"]

  youtube-studio-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: youtube-studio:dev
    container_name: youtube-studio-dev
    environment:
      - PYTHONUNBUFFERED=1
      - YOUTUBE_STUDIO_LOG_LEVEL=DEBUG
    volumes:
      - ./workspace:/app/workspace
      - ./templates:/app/templates
      - ./data:/app/data
      - ./logs:/app/logs
      - ./:/app
    ports:
      - "8000:8000"
    command: ["tail", "-f", "/dev/null"]

  youtube-studio-cli:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: youtube-studio:cli
    container_name: youtube-studio-cli
    environment:
      - PYTHONUNBUFFERED=1
      - YOUTUBE_STUDIO_LOG_LEVEL=${YOUTUBE_STUDIO_LOG_LEVEL:-INFO}
    volumes:
      - ./workspace:/app/workspace
      - ./templates:/app/templates
      - ./data:/app/data
      - ./logs:/app/logs
    entrypoint: ["python", "-m", "youtube_studio.cli"]

  youtube-studio-tests:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: youtube-studio:tests
    container_name: youtube-studio-tests
    environment:
      - PYTHONUNBUFFERED=1
      - YOUTUBE_STUDIO_LOG_LEVEL=DEBUG
    volumes:
      - ./workspace:/app/workspace
      - ./templates:/app/templates
      - ./data:/app/data
      - ./logs:/app/logs
    command: ["python", "-m", "unittest", "discover", "-s", "/app/workspace/tests", "-p", "test_*.py"]

volumes:
  youtube-studio-data:
  youtube-studio-logs:
  youtube-studio-templates:

networks:
  youtube-studio-network:
    driver: bridge
