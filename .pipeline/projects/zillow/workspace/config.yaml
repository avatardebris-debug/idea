# Zillow/Redfin Alert Tool Configuration

# API Endpoints
zillow:
  base_url: "https://www.zillow.com"
  search_url: "https://www.zillow.com/homes/search/"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

redfin:
  base_url: "https://www.redfin.com"
  search_url: "https://www.redfin.com/city/11111/Homes"
  headers:
    User-Agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# Alert Channels Configuration
email:
  enabled: true
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  use_tls: true
  sender_email: ""
  sender_password: ""
  recipients: []

sms:
  enabled: false
  provider: "twilio"
  account_sid: ""
  auth_token: ""
  from_number: ""
  to_numbers: []

# Search Criteria Templates
search_templates:
  - name: "starter_homes"
    description: "Affordable starter homes"
    min_price: 100000
    max_price: 300000
    min_beds: 2
    min_baths: 1
    property_types: ["house", "condo", "townhouse"]
    locations: []
    keywords: []

  - name: "luxury_homes"
    description: "Luxury properties"
    min_price: 500000
    max_price: 2000000
    min_beds: 3
    min_baths: 2
    property_types: ["house"]
    locations: []
    keywords: []

  - name: "investment_properties"
    description: "Investment opportunities"
    min_price: 50000
    max_price: 400000
    min_beds: 2
    min_baths: 1
    property_types: ["house", "condo", "multi_family"]
    locations: []
    keywords: ["rental", "income"]

# Application Settings
application:
  log_level: "INFO"
  log_file: "logs/alerts.log"
  scan_interval_minutes: 15
  max_retries: 3
  retry_delay_seconds: 30
